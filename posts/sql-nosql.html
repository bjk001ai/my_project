    <div class="article-body">

      <h2>SQL이 좋을 때</h2>
      <p>결제, 주문처럼 트랜잭션·조인이 중요한 서비스.</p>
      <h2>NoSQL이 좋을 때</h2>
      <p>로그, 피드, 실시간 메트릭처럼 스키마가 자주 바뀌는 경우.</p>
